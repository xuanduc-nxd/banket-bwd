<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trường ĐH — UniMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark">U</span> UNIMATCH</a>
    <nav class="site-nav">
      <a href="../index.html">Trang chủ</a>
      <a class="is-active" href="universities.html">Trường ĐH</a>
      <a href="majors.html">Ngành học</a>
      <a href="map.html">Bản đồ</a>
      <a href="../index.html#about">Giới thiệu</a>
    </nav>
    <button class="nav-toggle" aria-label="Mở menu"><span></span><span></span><span></span></button>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <span class="section-badge">Tra cứu</span>
        <h1>Danh sách trường ĐH</h1>
        <p>Lọc, so sánh, bookmark — không fluff.</p>
        <div class="toolbar">
          <input class="search-input" id="search" type="search" placeholder="Tên trường, mã, thành phố...">
          <select id="type" class="search-input">
            <option value="all">Loại trường</option>
            <option value="public">Công lập</option>
            <option value="private">Tư thục</option>
          </select>
          <select id="region" class="search-input">
            <option value="all">Khu vực</option>
            <option value="north">Miền Bắc</option>
            <option value="central">Miền Trung</option>
            <option value="south">Miền Nam</option>
          </select>
          <select id="category" class="search-input">
            <option value="all">Nhóm ngành</option>
          </select>
        </div>
        <p><strong id="resultCount">0 trường</strong></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="list-frame">
          <div class="grid-list" id="universitiesGrid"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="compare-dock" id="compareDock">
    <div>
      <strong>So sánh</strong>
      <div class="dock-items" id="compareItems"></div>
    </div>
    <div class="row-actions">
      <button class="btn-ghost" id="clearCompare">Xóa</button>
      <button class="btn-primary" id="openCompare">So sánh</button>
    </div>
  </div>

  <div class="modal" id="compareModal">
    <div class="modal-card">
      <div class="modal-header">
        <span>So sánh trường</span>
        <button class="mini-btn" id="closeModal" style="background:var(--mustard);color:var(--ink)">Đóng</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-grid">
      <a class="brand" href="../index.html"><span class="brand-mark">U</span> UniMatch</a>
      <div class="footer-links">
        <a href="../index.html">Trang chủ</a>
        <a href="majors.html">Ngành</a>
        <a href="map.html">Bản đồ</a>
      </div>
    </div>
  </footer>

  <script src="../js/majors.js"></script>
  <script src="../js/universities.js"></script>
  <script src="../js/app-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/universities-page.js"></script>
</body>
</html>
